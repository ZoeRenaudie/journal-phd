<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Exhibitions as Data</title>
<link rel="stylesheet" href="../dist/reset.css">
<link rel="stylesheet" href="../dist/reveal.css">
<link rel="stylesheet" href="../dist/theme/white.css">
<link rel="stylesheet" href="../dist/theme/white-custom.css">
<link rel="stylesheet" href="../plugin/highlight/monokai.css">
</head>
<body>
<div class="reveal">
<div class="slides">
<section data-markdown="./2026-07-29-DH.md"
data-transition-speed="fast"
data-separator="===>>>>>>===" 
data-separator-vertical="===vvvvvv==="
data-separator-notes="^\/\*\* Notes \*\*\/"
data-charset="UTF-8">
</section>
</div>
</div>

<script src="../dist/reveal.js"></script>
<script src="../plugin/notes/notes.js"></script>
<script src="../plugin/markdown/markdown.js"></script>
<script src="../plugin/highlight/highlight.js"></script>
<script src="../plugin/zoom/zoom.js"></script>
<script src="../plugin/mermaid/mermaid.js"></script>

<script>
Reveal.initialize({
  hash: true,
  slideNumber: 'c',
  transition: 'none',
  transitionSpeed: 'fast',
  backgroundTransition: 'none',
  hideCursorTime: 2000,
  pdfMaxPagesPerSlide: 1,
  showNotes: false,
  highlight: {
    beforeHighlight: (hljs) => hljs.configure({ languages: [] })
  },
  mermaid: {
    theme: 'base',
    themeVariables: {
      fontSize: '14px',
      primaryColor: '#EEEDFE',
      primaryTextColor: '#26215C',
      primaryBorderColor: '#534AB7',
      lineColor: '#73726c',
      secondaryColor: '#E1F5EE',
      tertiaryColor: '#FCEBEB',
      tertiaryTextColor: '#501313',
      tertiaryBorderColor: '#A32D2D',
    }
  },
  plugins: [ RevealMarkdown, RevealHighlight, RevealNotes, RevealZoom, RevealMermaid ]
});
</script>

</body>
</html>
